<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle of Pharsalus — 48 BC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#080808;overflow:hidden}
#app{width:100vw;height:100vh;display:flex;flex-direction:column;background:#080808;position:relative}

/* HEADER */
.hdr{flex-shrink:0;padding:10px 24px 8px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;background:#060606;z-index:10}
.hdr-title{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:#c8a050;letter-spacing:.12em}
.hdr-sub{font-family:'Cinzel',serif;font-size:10px;color:#3a3020;letter-spacing:.15em;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:16px}
.legend{display:flex;gap:14px;align-items:center}
.leg{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em}
.leg-c{width:22px;height:3px}
.leg-caesar{background:#cc2200}
.leg-pompey{background:#1a5fc8}
.leg-text-c{color:#cc3311}
.leg-text-p{color:#2266cc}

/* STAGE NAV BAR */
.stagebar{flex-shrink:0;padding:6px 24px;background:#040404;border-bottom:1px solid #141414;display:flex;gap:5px;align-items:center;overflow-x:auto}
.stg-btn{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.06em;padding:3px 10px;border:1px solid #1e1e1e;background:none;color:#3a3020;cursor:pointer;transition:all .2s;white-space:nowrap}
.stg-btn:hover{border-color:#c8a050;color:#c8a050}
.stg-btn.active{background:#c8a050;border-color:#c8a050;color:#080808;font-weight:600}
.stg-num{color:#2a2018;margin-right:4px;font-size:8px}

/* MAP AREA */
#map-wrap{flex:1;position:relative;overflow:hidden;background:#080808}
#battle-svg{width:100%;height:100%;display:block}

/* BOTTOM INFO PANEL */
.info-panel{flex-shrink:0;background:#040404;border-top:1px solid #1a1a1a;padding:10px 24px;min-height:90px;max-height:90px;display:flex;gap:24px;align-items:flex-start;overflow:hidden}
.info-stage{min-width:120px}
.info-stg-num{font-family:'Cinzel',serif;font-size:8px;color:#c8a050;letter-spacing:.15em;margin-bottom:3px}
.info-stg-title{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:#e0d0a0;line-height:1.3}
.info-divider{width:1px;background:#1a1a1a;align-self:stretch;flex-shrink:0}
.info-desc{flex:1;font-family:'IM Fell English',serif;font-size:11px;color:#6a5e40;line-height:1.65;font-style:italic}
.info-nav{display:flex;flex-direction:column;gap:6px;min-width:130px;align-self:center}
.nav-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;padding:6px 14px;border:1px solid;cursor:pointer;transition:all .2s;background:none}
.nav-next{border-color:#c8a050;color:#c8a050}
.nav-next:hover{background:#c8a050;color:#080808}
.nav-prev{border-color:#2a2018;color:#3a3020}
.nav-prev:hover{border-color:#6a5e40;color:#6a5e40}
.nav-btn:disabled{opacity:.2;cursor:default}

/* UNIT ANIMATIONS */
@keyframes pulse-red{0%,100%{opacity:1;r:7}50%{opacity:.7;r:9}}
@keyframes pulse-blue{0%,100%{opacity:1;r:7}50%{opacity:.7;r:9}}
@keyframes clash-flash{0%,100%{opacity:0}20%,80%{opacity:1}}
@keyframes advance{0%{transform:translateX(0)}100%{transform:translateX(var(--adv))}}
@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fade-in .5s ease forwards}

/* ARROW MARKERS defined in SVG defs */
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div>
      <div class="hdr-title">PHARSALVS · XLVIII A.C.N.</div>
      <div class="hdr-sub">IX KAL. SEPT. · THESSALIA · THE DECISIVE BATTLE OF THE ROMAN CIVIL WAR</div>
    </div>
    <div class="hdr-right">
      <div class="legend">
        <div class="leg"><div class="leg-c leg-caesar"></div><span class="leg-text-c">CAESAR · LEGIO XIV</span></div>
        <div class="leg"><div class="leg-c leg-pompey"></div><span class="leg-text-p">POMPEIVS · LEGIO XLVII</span></div>
      </div>
    </div>
  </div>

  <div class="stagebar" id="stagebar"></div>

  <div id="map-wrap">
    <svg id="battle-svg" viewBox="0 0 1000 580" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Caesar red arrow -->
        <marker id="arr-c" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M1 1L9 5L1 9" fill="none" stroke="#cc2200" stroke-width="2" stroke-linecap="round"/>
        </marker>
        <!-- Pompey blue arrow -->
        <marker id="arr-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M1 1L9 5L1 9" fill="none" stroke="#1a5fc8" stroke-width="2" stroke-linecap="round"/>
        </marker>
        <!-- Retreat arrow gray -->
        <marker id="arr-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M1 1L9 5L1 9" fill="none" stroke="#4a4030" stroke-width="2" stroke-linecap="round"/>
        </marker>
        <filter id="glow-red">
          <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-blue">
          <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-gold">
          <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Land texture -->
        <pattern id="land-tex" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
          <rect width="5" height="5" fill="#0e0c08"/>
          <circle cx="2.5" cy="2.5" r=".4" fill="#141208" opacity=".5"/>
        </pattern>
        <!-- Water texture -->
        <pattern id="water-tex" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
          <rect width="8" height="8" fill="#050d1a"/>
          <line x1="0" y1="4" x2="8" y2="4" stroke="#081525" stroke-width=".6" opacity=".6"/>
          <line x1="0" y1="8" x2="8" y2="8" stroke="#081525" stroke-width=".4" opacity=".4"/>
        </pattern>
        <!-- Hill pattern -->
        <pattern id="hill-tex" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
          <rect width="6" height="6" fill="#121008"/>
          <line x1="0" y1="3" x2="6" y2="3" stroke="#1a1810" stroke-width=".5"/>
        </pattern>
      </defs>

      <!-- Static base layer — always visible -->
      <!-- FULL MAP BACKGROUND (land) -->
      <rect width="1000" height="580" fill="url(#land-tex)"/>

      <!-- ENIPEUS RIVER (runs west to east across battlefield) -->
      <path d="M 0,360 Q 80,358 160,354 Q 240,350 320,348 Q 400,346 480,347 Q 560,348 640,350 Q 720,353 800,357 Q 880,361 950,366 L 1000,368" fill="none" stroke="url(#water-tex)" stroke-width="0"/>
      <!-- River fill -->
      <path d="M 0,354 Q 100,352 200,348 Q 300,344 400,343 Q 500,343 600,345 Q 700,348 800,353 Q 900,358 1000,364
               L 1000,372 Q 900,366 800,361 Q 700,356 600,353 Q 500,351 400,351 Q 300,352 200,356 Q 100,360 0,364 Z"
            fill="#05101e" stroke="#0a1e35" stroke-width="1"/>
      <text x="820" y="346" fill="#081828" font-size="9" font-family="Cinzel,serif" letter-spacing=".12em" opacity=".8">ENIPEVS FL.</text>

      <!-- Hills on Pompey's right (north) -->
      <path d="M 500,30 Q 540,50 580,80 Q 620,110 650,145 Q 670,168 660,190 Q 645,205 620,210 Q 590,212 565,205 Q 540,196 522,182 Q 500,164 490,142 Q 478,116 480,90 Q 484,62 500,30Z"
            fill="url(#hill-tex)" stroke="#1e1c10" stroke-width="1" opacity=".8"/>
      <text x="565" y="130" fill="#2a2618" font-size="8.5" font-family="Cinzel,serif" letter-spacing=".06em" text-anchor="middle" font-style="italic">Colles</text>

      <!-- Rolling terrain north -->
      <path d="M 200,20 Q 260,40 300,70 Q 330,95 320,120 Q 305,138 280,142 Q 255,144 235,132 Q 212,118 205,92 Q 198,64 200,20Z"
            fill="url(#hill-tex)" stroke="#1e1c10" stroke-width=".8" opacity=".6"/>

      <!-- Pharsalus town (south, across river) -->
      <rect x="320" y="395" width="36" height="24" rx="3" fill="#141008" stroke="#3a3020" stroke-width="1"/>
      <text x="338" y="408" fill="#5a4e30" font-size="8" font-family="Cinzel,serif" letter-spacing=".08em" text-anchor="middle">PHAR</text>
      <text x="338" y="417" fill="#5a4e30" font-size="7" font-family="Cinzel,serif" letter-spacing=".06em" text-anchor="middle">SALVS</text>

      <!-- Pompey camp (north hillside) -->
      <rect x="658" y="80" width="50" height="36" rx="2" fill="#050810" stroke="#1a3060" stroke-width="1"/>
      <text x="683" y="97" fill="#1a4080" font-size="7.5" font-family="Cinzel,serif" letter-spacing=".06em" text-anchor="middle">CASTRA</text>
      <text x="683" y="108" fill="#1a4080" font-size="7" font-family="Cinzel,serif" letter-spacing=".04em" text-anchor="middle">POMPEI</text>

      <!-- Caesar camp (south of river, west) -->
      <rect x="58" y="390" width="50" height="36" rx="2" fill="#100504" stroke="#601510" stroke-width="1"/>
      <text x="83" y="407" fill="#802010" font-size="7.5" font-family="Cinzel,serif" letter-spacing=".06em" text-anchor="middle">CASTRA</text>
      <text x="83" y="418" fill="#802010" font-size="7" font-family="Cinzel,serif" letter-spacing=".04em" text-anchor="middle">CAESARIS</text>

      <!-- Compass rose -->
      <g transform="translate(940,50)">
        <circle cx="0" cy="0" r="18" fill="none" stroke="#1e1c10" stroke-width=".8"/>
        <line x1="0" y1="-16" x2="0" y2="16" stroke="#2a2618" stroke-width=".8"/>
        <line x1="-16" y1="0" x2="16" y2="0" stroke="#2a2618" stroke-width=".8"/>
        <text x="0" y="-19" fill="#3a3020" font-size="9" font-family="Cinzel,serif" text-anchor="middle">N</text>
        <text x="0" y="27" fill="#2a2018" font-size="8" font-family="Cinzel,serif" text-anchor="middle">S</text>
        <text x="20" y="4" fill="#2a2018" font-size="8" font-family="Cinzel,serif" text-anchor="middle">E</text>
        <text x="-20" y="4" fill="#2a2018" font-size="8" font-family="Cinzel,serif" text-anchor="middle">O</text>
      </g>

      <!-- Scale bar -->
      <g transform="translate(30,545)">
        <line x1="0" y1="0" x2="120" y2="0" stroke="#2a2618" stroke-width="1"/>
        <line x1="0" y1="-4" x2="0" y2="4" stroke="#2a2618" stroke-width="1"/>
        <line x1="60" y1="-3" x2="60" y2="3" stroke="#2a2618" stroke-width=".8"/>
        <line x1="120" y1="-4" x2="120" y2="4" stroke="#2a2618" stroke-width="1"/>
        <text x="0" y="-8" fill="#2a2018" font-size="7" font-family="Cinzel,serif" text-anchor="middle">0</text>
        <text x="60" y="-8" fill="#2a2018" font-size="7" font-family="Cinzel,serif" text-anchor="middle">1 km</text>
        <text x="120" y="-8" fill="#2a2018" font-size="7" font-family="Cinzel,serif" text-anchor="middle">2 km</text>
      </g>

      <!-- Dynamic stage layer -->
      <g id="stage-layer"></g>

    </svg>
  </div>

  <div class="info-panel">
    <div class="info-stage">
      <div class="info-stg-num" id="info-num">STAGE I</div>
      <div class="info-stg-title" id="info-title">—</div>
    </div>
    <div class="info-divider"></div>
    <div class="info-desc" id="info-desc">—</div>
    <div class="info-divider"></div>
    <div class="info-nav">
      <button class="nav-btn nav-next" id="btn-next" onclick="nextStage()">ADVANCE ›</button>
      <button class="nav-btn nav-prev" id="btn-prev" onclick="prevStage()">‹ RETREAT</button>
    </div>
  </div>

</div>

<script>
/* ============================================================
   BATTLE OF PHARSALUS — 9 August 48 BC
   Each stage is a complete SVG scene drawn over the static base.
   Coordinates:
     West (Caesar's left / Pompey's right) = x ≈ 80–200
     East (Caesar's right / Pompey's left) = x ≈ 700–850
     Caesar's line y ≈ 290–320  (north of Enipeus)
     Pompey's line y ≈ 200–240
     Enipeus river y ≈ 343–372
   ============================================================ */

const STAGES = [

  // ── STAGE 1 ──────────────────────────────────────────────
  {
    num: 'STAGE I',
    title: 'The Armies Assemble',
    desc: 'Dawn, 9 August 48 BC. Caesar draws his army out of camp and forms three lines facing north. His 22,000 veterans are heavily outnumbered. Pompey deploys 47,000 infantry and 7,000 cavalry on the plain between the Enipeus and the hill ridge. Pompey anchors his left on the river; Caesar anchors his right on broken ground. Both sides wait. Caesar\'s men are eager — they have been starving. Pompey\'s soldiers are comfortable and confident.',

    svg: `
    <!-- ===== CAESAR'S ARMY — South line, west to east ===== -->
    <!-- Label -->
    <text x="440" y="268" fill="#cc2200" font-size="9" font-family="Cinzel,serif" letter-spacing=".1em" text-anchor="middle" opacity=".9">CAESAR · LEGIO XIV · 22,000 inf · 1,000 eq.</text>

    <!-- Caesar's Infantry line: 3 cohort lines represented as rectangles -->
    <!-- Left wing (X Legion — Caesar's best, on HIS right = east) anchored near hills -->
    <!-- Actually Caesar's RIGHT is on the hills (east). Left anchors on river. -->
    <!-- West (left) flank -->
    <rect x="90" y="290" width="55" height="22" rx="2" fill="#3a0800" stroke="#cc2200" stroke-width="1.2" opacity=".9"/>
    <text x="117" y="304" fill="#cc4422" font-size="7" font-family="Cinzel,serif" text-anchor="middle">LEGIO IX</text>
    <rect x="155" y="290" width="55" height="22" rx="2" fill="#3a0800" stroke="#cc2200" stroke-width="1.2" opacity=".9"/>
    <text x="182" y="304" fill="#cc4422" font-size="7" font-family="Cinzel,serif" text-anchor="middle">LEGIO VIII</text>
    <rect x="220" y="290" width="55" height="22" rx="2" fill="#3a0800" stroke="#cc2200" stroke-width="1.2" opacity=".9"/>
    <text x="247" y="304" fill="#cc4422" font-size="7" font-family="Cinzel,serif" text-anchor="middle">LEGIO XI</text>
    <rect x="285" y="290" width="55" height="22" rx="2" fill="#3a0800" stroke="#cc2200" stroke-width="1.2" opacity=".9"/>
    <text x="312" y="304" fill="#cc4422" font-size="7" font-family="Cinzel,serif" text-anchor="middle">LEGIO XII</text>
    <rect x="350" y="290" width="55" height="22" rx="2" fill="#3a0800" stroke="#cc2200" stroke-width="1.2" opacity=".9"/>
    <text x="377" y="304" fill="#cc4422" font-size="7" font-family="Cinzel,serif" text-anchor="middle">LEGIO XXVII</text>
    <rect x="415" y="290" width="55" height="22" rx="2" fill="#3a0800" stroke="#cc2200" stroke-width="1.2" opacity=".9"/>
    <text x="442" y="304" fill="#cc4422" font-size="7" font-family="Cinzel,serif" text-anchor="middle">LEGIO XXVIII</text>
    <!-- Center -->
    <rect x="480" y="290" width="55" height="22" rx="2" fill="#3a0800" stroke="#cc2200" stroke-width="1.2" opacity=".9"/>
    <text x="507" y="304" fill="#cc4422" font-size="7" font-family="Cinzel,serif" text-anchor="middle">LEGIO XIII</text>
    <!-- Right flank -->
    <rect x="545" y="290" width="55" height="22" rx="2" fill="#3a0800" stroke="#cc2200" stroke-width="1.4" opacity=".95"/>
    <text x="572" y="304" fill="#ee5533" font-size="7" font-family="Cinzel,serif" text-anchor="middle" font-weight="bold">LEGIO X</text>
    <!-- Caesar's cavalry (small, left/west flank) -->
    <ellipse cx="80" cy="270" rx="18" ry="10" fill="#200500" stroke="#cc2200" stroke-width="1" opacity=".8"/>
    <text x="80" y="273" fill="#aa2200" font-size="6.5" font-family="Cinzel,serif" text-anchor="middle">EQ.</text>

    <!-- Caesar command indicator -->
    <circle cx="340" cy="280" r="5" fill="#cc2200" opacity=".8" filter="url(#glow-red)"/>
    <text x="340" y="272" fill="#c8a050" font-size="8" font-family="Cinzel Decorative,serif" text-anchor="middle">C</text>

    <!-- SECRET RESERVE COHORTS (oblique angle, behind right flank) — Caesar's masterstroke hidden here -->
    <rect x="608" y="272" width="50" height="18" rx="2" fill="#200500" stroke="#882200" stroke-width="1" stroke-dasharray="4,2" opacity=".7" transform="rotate(-15,633,281)"/>
    <text x="633" y="283" fill="#882200" font-size="6.5" font-family="Cinzel,serif" text-anchor="middle" transform="rotate(-15,633,283)">VI COH.</text>
    <text x="633" y="265" fill="#5a3020" font-size="6.5" font-family="Cinzel,serif" text-anchor="middle" font-style="italic">RESERVA</text>

    <!-- ===== POMPEY'S ARMY — North line ===== -->
    <text x="450" y="193" fill="#1a5fc8" font-size="9" font-family="Cinzel,serif" letter-spacing=".1em" text-anchor="middle" opacity=".9">POMPEIVS · LEGIO XLVII · 47,000 inf · 7,000 eq.</text>

    <!-- Pompey left (west, anchored on Enipeus / river) -->
    <rect x="90" y="210" width="60" height="22" rx="2" fill="#030818" stroke="#1a5fc8" stroke-width="1.2" opacity=".9"/>
    <text x="120" y="224" fill="#3a80d8" font-size="7" font-family="Cinzel,serif" text-anchor="middle">LEG. I & III</text>
    <!-- Pompey infantry — much wider/longer line -->
    <rect x="160" y="210" width="60" height="22" rx="2" fill="#030818" stroke="#1a5fc8" stroke-width="1.2" opacity=".9"/>
    <text x="190" y="224" fill="#3a80d8" font-size="7" font-family="Cinzel,serif" text-anchor="middle">AFRANI</text>
    <rect x="230" y="210" width="60" height="22" rx="2" fill="#030818" stroke="#1a5fc8" stroke-width="1.2" opacity=".9"/>
    <text x="260" y="224" fill="#3a80d8" font-size="7" font-family="Cinzel,serif" text-anchor="middle">SYRIACI</text>
    <rect x="300" y="210" width="60" height="22" rx="2" fill="#030818" stroke="#1a5fc8" stroke-width="1.2" opacity=".9"/>
    <text x="330" y="224" fill="#3a80d8" font-size="7" font-family="Cinzel,serif" text-anchor="middle">HISPANI</text>
    <rect x="370" y="210" width="60" height="22" rx="2" fill="#030818" stroke="#1a5fc8" stroke-width="1.2" opacity=".9"/>
    <text x="400" y="224" fill="#3a80d8" font-size="7" font-family="Cinzel,serif" text-anchor="middle">ITALICI</text>
    <rect x="440" y="210" width="60" height="22" rx="2" fill="#030818" stroke="#1a5fc8" stroke-width="1.2" opacity=".9"/>
    <text x="470" y="224" fill="#3a80d8" font-size="7" font-family="Cinzel,serif" text-anchor="middle">GRAECI</text>
    <rect x="510" y="210" width="60" height="22" rx="2" fill="#030818" stroke="#1a5fc8" stroke-width="1.2" opacity=".9"/>
    <text x="540" y="224" fill="#3a80d8" font-size="7" font-family="Cinzel,serif" text-anchor="middle">ORIENT.</text>
    <!-- Pompey right wing infantry -->
    <rect x="580" y="210" width="60" height="22" rx="2" fill="#030818" stroke="#1a5fc8" stroke-width="1.4" opacity=".95"/>
    <text x="610" y="224" fill="#4a90e8" font-size="7" font-family="Cinzel,serif" text-anchor="middle">DOM. AHE.</text>

    <!-- Pompey's MASSIVE cavalry right wing -->
    <ellipse cx="720" cy="224" rx="55" ry="22" fill="#030c20" stroke="#1a5fc8" stroke-width="1.4" opacity=".9"/>
    <text x="720" y="222" fill="#3a80d8" font-size="7.5" font-family="Cinzel,serif" text-anchor="middle">EQUITATUS</text>
    <text x="720" y="233" fill="#2a60b8" font-size="6.5" font-family="Cinzel,serif" text-anchor="middle">VII,000</text>
    <!-- Allied cavalry east -->
    <ellipse cx="800" cy="214" rx="30" ry="16" fill="#030c20" stroke="#1a5fc8" stroke-width="1" opacity=".8"/>
    <text x="800" y="217" fill="#2a60b8" font-size="6.5" font-family="Cinzel,serif" text-anchor="middle">SOCII</text>

    <!-- Pompey command indicator -->
    <circle cx="430" cy="200" r="5" fill="#1a5fc8" opacity=".8" filter="url(#glow-blue)"/>
    <text x="430" y="192" fill="#c8d8f8" font-size="8" font-family="Cinzel Decorative,serif" text-anchor="middle">P</text>

    <!-- Pompey's archers / slingers (skirmishers) in front -->
    <text x="400" y="248" fill="#0a2848" font-size="7" font-family="Cinzel,serif" text-anchor="middle" letter-spacing=".06em" font-style="italic">— sagittarii · funditores —</text>

    <!-- Distance gap annotation -->
    <line x1="200" y1="246" x2="200" y2="278" stroke="#2a2618" stroke-width=".6" stroke-dasharray="3,3"/>
    <text x="210" y="265" fill="#3a3020" font-size="7.5" font-family="Cinzel,serif" font-style="italic">~300 passus</text>

    <!-- Titus Labienus annotation (Pompey's cavalry commander) -->
    <text x="740" y="200" fill="#2a5090" font-size="7" font-family="Cinzel,serif" text-anchor="middle" font-style="italic">T. LABIENVS</text>
    <!-- Mark Antony annotation (Caesar's left) -->
    <text x="100" y="284" fill="#8a2010" font-size="7" font-family="Cinzel,serif" text-anchor="middle" font-style="italic">M. ANTONIVS</text>
    <!-- Domitius Calvinus (Caesar's center) -->

let current = 0;

function render(idx) {
  const s = STAGES[idx];
  document.getElementById('stage-layer').innerHTML = `<g class="fade-in">${s.svg}</g>`;
  document.getElementById('info-num').textContent = s.num;
  document.getElementById('info-title').textContent = s.title;
  document.getElementById('info-desc').textContent = s.desc;
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === STAGES.length - 1;
  document.getElementById('btn-next').textContent = idx === STAGES.length - 1 ? 'FINIS' : 'ADVANCE ›';
  // Update stage bar
  document.querySelectorAll('.stg-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
}

function nextStage() { if (current < STAGES.length-1) { current++; render(current); } }
function prevStage() { if (current > 0) { current--; render(current); } }

// Build stage bar
const sb = document.getElementById('stagebar');
STAGES.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'stg-btn' + (i===0?' active':'');
  b.innerHTML = `<span class="stg-num">${String(i+1).padStart(2,'0')}</span>${s.title}`;
  b.onclick = () => { current = i; render(i); };
  sb.appendChild(b);
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStage(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStage(); }
});

render(0);
</script>
