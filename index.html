<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPQR Campaign Selection</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at center, #151515, #050505);
        color: #e6e6e6;
        overflow: hidden;
    }

    /* Europe faint background */
    body::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: url("https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Europe_location_map.svg/2000px-Europe_location_map.svg.png");
        background-size: cover;
        opacity: 0.05;
        filter: grayscale(100%);
        z-index: 0;
    }

    /* 🦅 ROMAN EAGLE (AQUILA) BACKGROUND */
    .eagle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 520px;
        height: 520px;
        background: url("https://en.wikipedia.org/wiki/Aquila_(Roman)#/media/File:KonstantinsbogenAttika.jpg");
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.08;
        filter: drop-shadow(0 0 25px rgba(139,0,0,0.5));
        z-index: 1;
        pointer-events: none;
    }

    /* red glow behind eagle */
    .eagle-glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 700px;
        height: 700px;
        background: radial-gradient(circle, rgba(139,0,0,0.25), transparent 60%);
        z-index: 0;
        pointer-events: none;
    }

    /* Title */
    .title {
        position: relative;
        text-align: center;
        padding-top: 40px;
        font-size: 28px;
        letter-spacing: 4px;
        z-index: 3;
    }

    .title span {
        color: #8b0000;
        font-weight: bold;
    }

    .subtitle {
        text-align: center;
        font-size: 12px;
        color: #aaa;
        margin-top: 8px;
        letter-spacing: 2px;
        position: relative;
        z-index: 3;
    }

    /* Menu layout */
    .menu {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 80px;
        position: relative;
        z-index: 3;
        flex-wrap: wrap;
    }

    /* Campaign cards */
    .card {
        width: 320px;
        height: 180px;
        background: linear-gradient(135deg, #101010, #0a0a0a);
        border: 1px solid #2a2a2a;
        border-left: 4px solid #8b0000;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .card:hover {
        transform: translateY(-10px) scale(1.05);
        border-left: 4px solid #ff1a1a;
        box-shadow: 0 0 25px rgba(139, 0, 0, 0.6);
    }

    .card::after {
        content: "";
        position: absolute;
        top: -50%;
        left: -60%;
        width: 50%;
        height: 200%;
        background: linear-gradient(90deg, transparent, rgba(255,0,0,0.15), transparent);
        transform: rotate(25deg);
        transition: 0.5s;
    }

    .card:hover::after {
        left: 120%;
    }

    .card h2 {
        margin: 20px;
        font-size: 16px;
        color: #fff;
        letter-spacing: 1px;
    }

    .card p {
        margin: 20px;
        font-size: 12px;
        color: #aaa;
    }

    .tag {
        position: absolute;
        bottom: 15px;
        left: 20px;
        font-size: 11px;
        color: #8b0000;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* fade in */
    .card {
        animation: fadeIn 0.8s ease forwards;
        opacity: 0;
    }

    .card:nth-child(1) { animation-delay: 0.2s; }
    .card:nth-child(2) { animation-delay: 0.4s; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

</style>
</head>

<body>

<!-- Background layers -->
<div class="eagle-glow"></div>
<div class="eagle"></div>

<div class="title">
    <span>SPQR</span> CAMPAIGN SELECT
</div>

<div class="subtitle">
    Select a theater of war
</div>

<div class="menu">

    <a href="caesars_gallic_wars_campaign_map.html" target="_blank" style="text-decoration:none;">
        <div class="card">
            <h2>GALLIC WARS</h2>
            <p>Caesar’s conquest of Gaul. Tribal resistance and Roman expansion across northern Europe.</p>
            <div class="tag">Enter Campaign →</div>
        </div>
    </a>

    <a href="battle_of_pharsalus.html" target="_blank" style="text-decoration:none;">
        <div class="card">
            <h2>BATTLE OF PHARSALUS</h2>
            <p>Caesar vs Pompey. The decisive battle for control of the Roman Republic.</p>
            <div class="tag">Enter Battle →</div>
        </div>
    </a>

</div>

</body>
</html>
